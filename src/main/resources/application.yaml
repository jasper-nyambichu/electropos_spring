spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/electroprodb}
    username: ${SPRING_DATASOURCE_USERNAME:dickson}
    password: ${SPRING_DATASOURCE_PASSWORD:Dickson@02}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

server:
  port: ${PORT:8080}